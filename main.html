<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bootstrap Shopping Cart Layout</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shopping-cart">
      <div class="container">
        <div class="block-heading text-center">
          <h2>Shopping Cart</h2>
          <p class="text-center">Review your products and proceed to checkout.</p>
        </div>

        <div class="content">
          <div class="row">
            <div class="col-lg-8">
              <div class="items">
                <div class="product">
                  <div class="row">
                    <div class="col-md-3">
                      <img class="img-fluid mx-auto d-block" src="https://picsum.photos/seed/product-one/300/300" alt="Product one">
                    </div>
                    <div class="col-md-9">
                      <div class="info">
                        <div class="row">
                          <div class="col-md-5 product-name">
                            <a href="#">Product One</a>
                            <div class="product-info">
                              <div>Display: <span class="value">5 inch</span></div>
                              <div>RAM: <span class="value">4GB</span></div>
                              <div>Memory: <span class="value">32GB</span></div>
                            </div>
                          </div>
                          <div class="col-md-4 quantity">
                            <label for="quantity-1">Quantity:</label>
                            <input id="quantity-1" type="number" value="1" class="form-control quantity-input">
                          </div>
                          <div class="col-md-3 price"><span>$120</span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="product">
                  <div class="row">
                    <div class="col-md-3">
                      <img class="img-fluid mx-auto d-block" src="https://picsum.photos/seed/product-two/300/300" alt="Product two">
                    </div>
                    <div class="col-md-9">
                      <div class="info">
                        <div class="row">
                          <div class="col-md-5 product-name">
                            <a href="#">Product Two</a>
                            <div class="product-info">
                              <div>Display: <span class="value">6 inch</span></div>
                              <div>RAM: <span class="value">8GB</span></div>
                              <div>Memory: <span class="value">64GB</span></div>
                            </div>
                          </div>
                          <div class="col-md-4 quantity">
                            <label for="quantity-2">Quantity:</label>
                            <input id="quantity-2" type="number" value="1" class="form-control quantity-input">
                          </div>
                          <div class="col-md-3 price"><span>$120</span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="product">
                  <div class="row">
                    <div class="col-md-3">
                      <img class="img-fluid mx-auto d-block" src="https://picsum.photos/seed/product-three/300/300" alt="Product three">
                    </div>
                    <div class="col-md-9">
                      <div class="info">
                        <div class="row">
                          <div class="col-md-5 product-name">
                            <a href="#">Product Three</a>
                            <div class="product-info">
                              <div>Display: <span class="value">5.5 inch</span></div>
                              <div>RAM: <span class="value">6GB</span></div>
                              <div>Memory: <span class="value">128GB</span></div>
                            </div>
                          </div>
                          <div class="col-md-4 quantity">
                            <label for="quantity-3">Quantity:</label>
                            <input id="quantity-3" type="number" value="1" class="form-control quantity-input">
                          </div>
                          <div class="col-md-3 price"><span>$120</span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-lg-4">
              <div class="summary">
                <h3>Summary</h3>
                <div class="summary-item"><span class="text">Subtotal</span><span class="price">$360</span></div>
                <div class="summary-item"><span class="text">Discount</span><span class="price">$0</span></div>
                <div class="summary-item"><span class="text">Shipping</span><span class="price">$0</span></div>
                <div class="summary-item"><span class="text">Total</span><span class="price">$360</span></div>
                <button type="button" class="btn btn-primary btn-lg btn-block">Checkout</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
